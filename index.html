<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Professional Todo Application</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Professional Todo Application</h1>

    <!-- Statistics -->

    <div class="stats">

        <div class="stat-card">

            <h3 id="totalTasks">0</h3>

            <p>Total Tasks</p>

        </div>

        <div class="stat-card">

            <h3 id="pendingTasks">0</h3>

            <p>Pending</p>

        </div>

        <div class="stat-card">

            <h3 id="completedTasks">0</h3>

            <p>Completed</p>

        </div>

    </div>

    <!-- Search -->

    <input
        type="text"
        id="searchTask"
        placeholder="🔍 Search Task..."
    >

    <!-- Task Form -->

    <div class="input-box">

        <input
            type="text"
            id="todoInput"
            placeholder="Task Title"
        >

        <input
            type="text"
            id="category"
            placeholder="Category"
        >

        <select id="priority">

            <option value="">Priority</option>

            <option>High</option>

            <option>Medium</option>

            <option>Low</option>

        </select>

        <select id="status">

            <option value="">Status</option>

            <option>Pending</option>

            <option>In Progress</option>

            <option>Completed</option>

        </select>

        <input
            type="date"
            id="startDate"
        >

        <input
            type="date"
            id="endDate"
        >

        <button onclick="addTodo()">

            Add Task

        </button>

    </div>

    <!-- Dashboard Charts -->

    <div class="charts">

        <div class="chart-card">

            <h2>Task Status</h2>

            <canvas id="statusChart"></canvas>

        </div>

        <div class="chart-card">

            <h2>Priority Distribution</h2>

            <canvas id="priorityChart"></canvas>

        </div>

    </div>

    <!-- Todo Cards -->

    <ul id="todoList"></ul>

</div>

<!-- Modal -->

<div id="modal" class="modal">

    <div class="modal-content">

        <span
            class="close"
            onclick="closeModal()">

            &times;

        </span>

        <h2>Task Details</h2>

        <div id="todoDetails"></div>

    </div>

</div>

<!-- Chart.js Library -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- JavaScript -->

<script src="script.js"></script>

</body>

</html>
